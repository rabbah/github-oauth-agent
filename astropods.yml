# yaml-language-server: $schema=https://astropods.ai/schema/package.json
spec: package/v1
name: "github-oauth-agent"

meta:
  visibility: public

agent:
  build:
    context: .
    dockerfile: Dockerfile
  interfaces:
    frontend: true
    messaging: true
  inputs:
    - name: OAUTH_CLIENT_ID
      datatype: string
      description: OAuth client ID
    - name: OAUTH_CLIENT_SECRET
      datatype: string
      secret: true
      description: OAuth client secret
    - name: OAUTH_AUTH_URL
      datatype: string
      description: OAuth authorization endpoint URL
    - name: OAUTH_TOKEN_URL
      datatype: string
      description: OAuth token exchange endpoint URL
    - name: OAUTH_CALLBACK_URL
      datatype: string
      description: OAuth redirect URI
    - name: OAUTH_SCOPES
      datatype: string
      description: OAuth scopes to request
      default: openid profile email
      optional: true
    - name: OAUTH_USERINFO_URL
      datatype: string
      description: OAuth userinfo endpoint URL
      optional: true

models:
  openai:
    provider: openai

dev:
  command: bun --watch agent/index.ts
  interfaces:
    messaging:
      adapters: [web]
    frontend:
      port: 80
